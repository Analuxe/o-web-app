name: o_web
description: A new Flutter web project for O.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  supabase_flutter: ^2.6.0
  flutter_svg: ^2.0.10+1
  provider: ^6.1.2
  go_router: ^14.2.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  crop_your_image: ^1.1.0
  geolocator: ^12.0.0
  swipe_cards: ^2.0.0
  geocoding: ^3.0.0
  timeago: ^3.6.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo.png
