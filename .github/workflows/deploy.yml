name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# This workflow builds and deploys the Flutter web app to GitHub Pages
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Flutter 🚀
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clean Build 🧹
        run: flutter clean

      - name: Install Dependencies 📦
        run: flutter pub get

      - name: Build Web 🏗️
        run: flutter build web --release --base-href /o-web-app/

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
